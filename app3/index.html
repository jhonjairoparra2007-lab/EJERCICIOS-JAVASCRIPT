<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicación 3 - Maps</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #1e40af);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #ffffff;
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  a.back {
    display: inline-block;
    margin-bottom: 16px;
    color: #1e40af;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
  }
  a.back:hover { text-decoration: underline; }
  h1 {
    color: #1e3a8a;
    font-size: 1.4rem;
    margin-top: 0;
  }
  p.desc {
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  button {
    flex: 1 1 auto;
    min-width: 160px;
    padding: 12px 14px;
    border: none;
    border-radius: 8px;
    background: #1e40af;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  button:hover { background: #1e3a8a; }
  #resultado {
    background: #eff6ff;
    border: 1px dashed #1e40af;
    border-radius: 10px;
    padding: 16px;
    min-height: 50px;
    font-family: 'Consolas', monospace;
    color: #1e3a8a;
    word-break: break-word;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <div class="container">
    <a class="back" href="../index.html">&larr; Volver al inicio</a>
    <h1>Aplicación 3: Maps 🗓️</h1>
    <p class="desc">Map que asocia el número del mes con su nombre (1 =&gt; Enero). Comprobar existencia del mes 5, añadir clave con array de meses de verano e imprimir el mapa.</p>
    <div class="buttons">
      <button id="btnComprobar">Comprobar mes 5</button>
      <button id="btnAgregarVerano">Añadir meses de verano</button>
      <button id="btnImprimir">Imprimir map</button>
    </div>
    <div id="resultado">El resultado aparecerá aquí...</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
