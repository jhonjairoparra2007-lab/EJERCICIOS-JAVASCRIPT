<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicación 1 - Arrays</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f766e, #134e4a);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #ffffff;
    border-radius: 16px;
    padding: 32px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  a.back {
    display: inline-block;
    margin-bottom: 16px;
    color: #0f766e;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
  }
  a.back:hover { text-decoration: underline; }
  h1 {
    color: #134e4a;
    font-size: 1.4rem;
    margin-top: 0;
  }
  p.desc {
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  button {
    flex: 1 1 auto;
    min-width: 140px;
    padding: 12px 14px;
    border: none;
    border-radius: 8px;
    background: #0f766e;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  button:hover { background: #0d5f58; }
  #resultado {
    background: #f0fdfa;
    border: 1px dashed #0f766e;
    border-radius: 10px;
    padding: 16px;
    min-height: 50px;
    font-family: 'Consolas', monospace;
    color: #134e4a;
    word-break: break-word;
  }
</style>
</head>
<body>
  <div class="container">
    <a class="back" href="../index.html">&larr; Volver al inicio</a>
    <h1>Aplicación 1: Arrays 🐾</h1>
    <p class="desc">Array de 5 animales. Añadir al inicio, añadir al final, eliminar el elemento en la tercera posición e imprimir.</p>
    <div class="buttons">
      <button id="btnInicio">Añadir al inicio</button>
      <button id="btnFinal">Añadir al final</button>
      <button id="btnEliminar">Eliminar 3ra posición</button>
      <button id="btnImprimir">Imprimir array</button>
    </div>
    <div id="resultado">El resultado aparecerá aquí...</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
