<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicación 2 - Sets</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #7c2d12, #9a3412);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #ffffff;
    border-radius: 16px;
    padding: 32px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  a.back {
    display: inline-block;
    margin-bottom: 16px;
    color: #9a3412;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
  }
  a.back:hover { text-decoration: underline; }
  h1 {
    color: #7c2d12;
    font-size: 1.4rem;
    margin-top: 0;
  }
  p.desc {
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  button {
    flex: 1 1 auto;
    min-width: 140px;
    padding: 12px 14px;
    border: none;
    border-radius: 8px;
    background: #9a3412;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  button:hover { background: #7c2d12; }
  #resultado {
    background: #fff7ed;
    border: 1px dashed #9a3412;
    border-radius: 10px;
    padding: 16px;
    min-height: 50px;
    font-family: 'Consolas', monospace;
    color: #7c2d12;
    word-break: break-word;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <div class="container">
    <a class="back" href="../index.html">&larr; Volver al inicio</a>
    <h1>Aplicación 2: Sets 📚</h1>
    <p class="desc">Set de 5 libros. Añadir un libro, eliminar un libro a elección e imprimir el set.</p>
    <div class="buttons">
      <button id="btnAgregar">Añadir libro</button>
      <button id="btnEliminar">Eliminar libro</button>
      <button id="btnImprimir">Imprimir set</button>
    </div>
    <div id="resultado">El resultado aparecerá aquí...</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
