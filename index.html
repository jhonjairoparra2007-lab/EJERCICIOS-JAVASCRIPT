<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejercicios de Estructuras en JavaScript</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #334155);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    color: #1e293b;
    margin-bottom: 8px;
    font-size: 1.6rem;
  }
  p.subtitle {
    text-align: center;
    color: #64748b;
    margin-top: 0;
    margin-bottom: 30px;
    font-size: 0.95rem;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  a.card {
    display: block;
    text-decoration: none;
    background: #f1f5f9;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 22px 16px;
    text-align: center;
    color: #1e293b;
    font-weight: 600;
    transition: all 0.2s ease;
  }
  a.card:hover {
    border-color: #6366f1;
    background: #eef2ff;
    transform: translateY(-3px);
  }
  a.card span.emoji {
    display: block;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  a.card small {
    display: block;
    font-weight: 400;
    color: #64748b;
    margin-top: 4px;
  }
  footer {
    text-align: center;
    margin-top: 30px;
    color: #94a3b8;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Ejercicios de Estructuras en JavaScript</h1>
    <p class="subtitle">ADSO 35 · Selecciona una aplicación</p>
    <div class="grid">
      <a class="card" href="app1/index.html">
        <span class="emoji">🐾</span>
        Aplicación 1
        <small>Arrays</small>
      </a>
      <a class="card" href="app2/index.html">
        <span class="emoji">📚</span>
        Aplicación 2
        <small>Sets</small>
      </a>
      <a class="card" href="app3/index.html">
        <span class="emoji">🗓️</span>
        Aplicación 3
        <small>Maps</small>
      </a>
      <a class="card" href="app4/index.html">
        <span class="emoji">🔄</span>
        Aplicación 4
        <small>Array → Set → Map</small>
      </a>
    </div>
    <footer>Darío Fernando Gómez Z. — Instructor CEAI</footer>
  </div>
</body>
</html>
